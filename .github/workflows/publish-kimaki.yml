name: Publish Kimaki

on:
  workflow_dispatch:
  push:
    tags:
      - 'kimaki-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.9.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace runtime dependencies
        run: |
          pnpm -C errore build
          pnpm -C traforo build

      - name: Generate and typecheck discord package
        run: |
          pnpm -C discord generate
          pnpm -C discord tsc

      - name: Publish @trustmedis/kimaki
        run: pnpm -C discord publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
