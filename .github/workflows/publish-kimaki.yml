name: Publish Kimaki

on:
  workflow_dispatch:
  push:
    tags:
      - 'kimaki-v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.9.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Setup npm CLI for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace runtime dependencies
        run: |
          pnpm -C errore build
          pnpm -C traforo build

      - name: Generate and typecheck discord package
        run: |
          pnpm -C discord generate
          pnpm -C discord tsc

      - name: Pack @trustmedis/kimaki
        run: |
          rm -rf tmp-publish
          mkdir -p tmp-publish
          pnpm -C discord pack --pack-destination ../tmp-publish

      - name: Publish @trustmedis/kimaki with trusted publishing
        run: npm publish ./tmp-publish/*.tgz --access public
